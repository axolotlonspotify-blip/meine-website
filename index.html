<!DOCTYPE html>
<html>
<head>
    <title>Control Panel</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-top: 20px;
            font-size: 28px;
        }

        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            cursor: pointer;
            color: white;
            background: #ef4444;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.03);
        }

        button:active {
            transform: scale(0.97);
        }

        .on {
            background: #22c55e !important;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            border-radius: 12px;
            border: none;
            outline: none;
            margin-top: 10px;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 15px;
        }

        li {
            background: rgba(255,255,255,0.1);
            padding: 12px;
            margin-top: 10px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .delete {
            background: #ef4444;
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: 0.2s;
        }

        .delete:hover {
            transform: scale(1.1);
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Control Panel</h1>

    <div class="card">
        <button onclick="toggle(this)">Internet AUS</button>
        <button onclick="toggle(this)">Webseiten AUS</button>
    </div>

    <div class="card">
        <button onclick="togglePanel()">Webseiten & Apps</button>

        <div id="panel" style="display:none; margin-top:10px;">
            <input id="input" placeholder="z.B. youtube.com">
            <button onclick="addItem()">Hinzufügen</button>

            <ul id="list"></ul>
        </div>
    </div>

</div>

<script>
let list = JSON.parse(localStorage.getItem("blocklist")) || [];

window.onload = renderList;

function toggle(button) {
    button.classList.toggle("on");

    if (button.classList.contains("on")) {
        button.innerHTML = button.innerHTML.replace("AUS", "AN");
    } else {
        button.innerHTML = button.innerHTML.replace("AN", "AUS");
    }
}

function togglePanel() {
    const panel = document.getElementById("panel");
    panel.style.display = panel.style.display === "block" ? "none" : "block";
}

function addItem() {
    const input = document.getElementById("input");
    const value = input.value.trim();

    if (!value) return;

    list.push(value);
    save();
    renderList();

    input.value = "";
}

function removeItem(index) {
    list.splice(index, 1);
    save();
    renderList();
}

function save() {
    localStorage.setItem("blocklist", JSON.stringify(list));
}

function renderList() {
    const ul = document.getElementById("list");
    ul.innerHTML = "";

    list.forEach((item, index) => {
        const li = document.createElement("li");

        const text = document.createElement("span");
        text.textContent = item;

        const btn = document.createElement("button");
        btn.className = "delete";
        btn.innerHTML = "✕";
        btn.onclick = () => removeItem(index);

        li.appendChild(text);
        li.appendChild(btn);

        ul.appendChild(li);
    });
}
</script>

</body>
</html>
