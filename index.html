<!DOCTYPE html>
<html>
<head>
    <title>Mein Controller</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background-color: #f4f4f4;
        }

        button {
            padding: 20px 40px;
            font-size: 18px;
            margin: 10px;
            border: none;
            color: white;
            cursor: pointer;
            background-color: red;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.2s ease;
        }

        button:hover {
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .on {
            background-color: green;
        }

        #panel {
            margin-top: 30px;
            display: none;
        }

        input {
            padding: 10px;
            width: 250px;
            border-radius: 10px;
            border: 1px solid gray;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: white;
            margin: 5px auto;
            padding: 10px;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .delete {
            background: red;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 5px 10px;
            cursor: pointer;
        }

        .delete:hover {
            background: darkred;
        }
    </style>
</head>

<body>

<h1>Mein Controller</h1>

<button onclick="toggle(this)">Internet AUS</button>
<button onclick="toggle(this)">Webseiten AUS</button>

<br>

<button onclick="openPanel()">Webseiten & Apps</button>

<div id="panel">

    <h3>Blockliste</h3>

    <input id="input" placeholder="z.B. youtube.com">
    <button onclick="addItem()">Hinzufügen</button>

    <ul id="list"></ul>

</div>

<script>
function toggle(button) {
    button.classList.toggle("on");

    if (button.classList.contains("on")) {
        button.innerHTML = button.innerHTML.replace("AUS", "AN");
    } else {
        button.innerHTML = button.innerHTML.replace("AN", "AUS");
    }
}

function openPanel() {
    const panel = document.getElementById("panel");
    panel.style.display = panel.style.display === "none" ? "block" : "none";
}

function addItem() {
    const input = document.getElementById("input");
    const value = input.value.trim();

    if (value === "") return;

    const li = document.createElement("li");

    const text = document.createElement("span");
    text.innerText = value;

    const del = document.createElement("button");
    del.innerText = "❌";
    del.className = "delete";
    del.onclick = function () {
        li.remove();
    };

    li.appendChild(text);
    li.appendChild(del);

    document.getElementById("list").appendChild(li);

    input.value = "";
}
</script>

</body>
</html>
