<!DOCTYPE html>
<html>
<head>
    <title>Mein Controller</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background-color: #f4f4f4;
        }

        button {
            padding: 20px 40px;
            font-size: 18px;
            margin: 10px;
            border: none;
            color: white;
            cursor: pointer;
            background-color: red; /* AUS */
            border-radius: 20px;

            /* Schatten */
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);

            /* Animation */
            transition: all 0.2s ease;
        }

        button:hover {
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .on {
            background-color: green; /* AN */
        }
    </style>
</head>

<body>

<h1>Mein Controller</h1>

<button onclick="toggle(this)">Internet AUS</button>
<button onclick="toggle(this)">Webseiten AUS</button>

<script>
function toggle(button) {
    button.classList.toggle("on");

    if (button.classList.contains("on")) {
        button.innerHTML = button.innerHTML.replace("AUS", "AN");
    } else {
        button.innerHTML = button.innerHTML.replace("AN", "AUS");
    }
}
</script>

</body>
</html>
